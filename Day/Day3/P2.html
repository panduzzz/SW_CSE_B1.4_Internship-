<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table Tag: Span row/col</title>
</head>
<body>
    <table border="1">
        <tr>
            <th colspan="3">
                Student Details
            </th>
        </tr>
        <tr>
            <td>Name</td>
            <td>Pavithra</td>
            <td>Panduzzz</td>
        </tr>
        <tr>
            <td>Courses</td>
            <td>Dance</td>
            <td>Calisthenics</td>
        </tr>
    </table>
    <p>Rowspan</p>
    <table border="1">
        <tr>
            <th rowspan="2">Day</th>
            <th>Morning</th>
            <th>Evening</th>
        </tr>
        <tr>
            <td>Classical</td>
            <td>Western</td>
        </tr>
    </table>
</body>
</html>
